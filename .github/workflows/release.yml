name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Strict target SemVer without a leading v
        required: true
        type: string
      supported_from:
        description: Strictly SemVer-sorted comma-separated source versions; empty for the first release
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  linux-amd64:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      VERSION: ${{ inputs.version }}
      SUPPORTED_FROM: ${{ inputs.supported_from }}

    steps:
      - name: Check out the exact source revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install the locked Go toolchain
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.3"
          cache-dependency-path: go.sum

      - name: Install the locked Bun toolchain
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            autoconf \
            automake \
            build-essential \
            curl \
            gcc-13 \
            gperf \
            libcap-dev \
            libglib2.0-dev \
            libjson-c-dev \
            libseccomp-dev \
            libtool \
            meson \
            ninja-build \
            pkg-config \
            protobuf-compiler \
            python3
          mkdir -p "$RUNNER_TEMP/platformd-toolchain"
          ln -s /usr/bin/gcc-13 "$RUNNER_TEMP/platformd-toolchain/gcc"
          echo "$RUNNER_TEMP/platformd-toolchain" >> "$GITHUB_PATH"

      - name: Install the locked Rust toolchain
        run: |
          rustup toolchain install 1.86.0 --profile minimal --no-self-update
          rustup override set 1.86.0

      - name: Verify locked toolchain versions
        run: |
          test "$(go version | awk '{print $3}')" = "go1.26.3"
          test "$(bun --version)" = "1.3.14"
          test "$(rustc --version | awk '{print $2}')" = "1.86.0"
          test "$(protoc --version | awk '{print $2}')" = "3.21.12"
          test "gcc-$(gcc -dumpfullversion)" = "gcc-13.3.0"

      - name: Reject an existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release v$VERSION already exists" >&2
            exit 1
          fi

      - name: Install frontend dependencies
        run: bun --cwd=_frontend install --frozen-lockfile

      - name: Verify frontend
        run: |
          bun --cwd=_frontend run typecheck
          bun --cwd=_frontend run check
          bun --cwd=_frontend test
          bun --cwd=_frontend run build:web

      - name: Verify Go code
        run: |
          go test -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension" ./...
          go test -race -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension" ./...
          go vet -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension" ./...

      - name: Fuzz public protocol boundaries
        run: |
          go test -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension" ./internal/registry -run '^$' -fuzz '^FuzzRegistryInputs$' -fuzztime 10s
          go test -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension" ./internal/objectstore -run '^$' -fuzz '^FuzzS3Inputs$' -fuzztime 10s
          go test -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension" ./internal/objectstore -run '^$' -fuzz '^FuzzSigV4Inputs$' -fuzztime 10s
          go test -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension" ./internal/internaldns -run '^$' -fuzz '^FuzzDNSInputs$' -fuzztime 10s
          go test -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension" ./internal/ingress -run '^$' -fuzz '^FuzzProxyInputs$' -fuzztime 10s

      - name: Build and verify bundled runtime
        env:
          PLATFORMD_STRICT_TOOLCHAIN: "1"
        run: build/runtime-linux-amd64.sh

      - name: Build self-contained release
        run: |
          CGO_ENABLED=1 go build \
            -trimpath \
            -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension" \
            -ldflags "-X github.com/iivankin/platformd/internal/version.Version=$VERSION -X github.com/iivankin/platformd/internal/version.Commit=$GITHUB_SHA" \
            -o dist/platformd-linux-amd64 \
            .
          go run ./tools/bundle --executable dist/platformd-linux-amd64 --runtime dist/runtime
          python3 -m zipfile -t dist/platformd-linux-amd64

      - name: Sign release manifest
        env:
          RELEASE_PRIVATE_KEY_B64: ${{ secrets.PLATFORMD_RELEASE_PRIVATE_KEY_B64 }}
        run: |
          test -n "$RELEASE_PRIVATE_KEY_B64"
          key_path="$RUNNER_TEMP/platformd-release-private.pem"
          umask 077
          printf '%s' "$RELEASE_PRIVATE_KEY_B64" | base64 --decode > "$key_path"
          arguments=(
            --binary dist/platformd-linux-amd64
            --binary-url "https://github.com/$GITHUB_REPOSITORY/releases/download/v$VERSION/platformd-linux-amd64"
            --version "$VERSION"
            --private-key "$key_path"
            --output dist/platformd-linux-amd64.manifest.json
          )
          if [[ -n "$SUPPORTED_FROM" ]]; then
            IFS=',' read -ra source_versions <<< "$SUPPORTED_FROM"
            for source_version in "${source_versions[@]}"; do
              arguments+=(--supported-from "$source_version")
            done
          fi
          go run ./tools/release-manifest "${arguments[@]}"
          rm -f "$key_path"
          (
            cd dist
            sha256sum platformd-linux-amd64 platformd-linux-amd64.manifest.json > SHA256SUMS
            sha256sum --check SHA256SUMS
          )

      - name: Publish immutable release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "v$VERSION" \
            --generate-notes \
            dist/platformd-linux-amd64 \
            dist/platformd-linux-amd64.manifest.json \
            dist/SHA256SUMS
