name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Strict target SemVer without a leading v
        required: true
        type: string
      supported_from:
        description: Strictly SemVer-sorted comma-separated source versions; empty for the first release
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  linux-amd64:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      VERSION: ${{ inputs.version }}
      SUPPORTED_FROM: ${{ inputs.supported_from }}

    steps:
      - name: Check out the exact source revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install the locked Go toolchain
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.3"
          cache-dependency-path: go.sum

      - name: Install the locked Bun toolchain
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            autoconf \
            automake \
            build-essential \
            curl \
            gcc-13 \
            gperf \
            libcap-dev \
            libglib2.0-dev \
            libjson-c-dev \
            libseccomp-dev \
            libtool \
            meson \
            ninja-build \
            pkg-config \
            protobuf-compiler \
            python3
          mkdir -p "$RUNNER_TEMP/platformd-toolchain"
          ln -s /usr/bin/gcc-13 "$RUNNER_TEMP/platformd-toolchain/gcc"
          echo "$RUNNER_TEMP/platformd-toolchain" >> "$GITHUB_PATH"

      - name: Install the locked Rust toolchain
        run: |
          rustup toolchain install 1.86.0 --profile minimal --no-self-update
          rustup override set 1.86.0

      - name: Verify locked toolchain versions
        run: |
          test "$(go version | awk '{print $3}')" = "go1.26.3"
          test "$(bun --version)" = "1.3.14"
          test "$(rustc --version | awk '{print $2}')" = "1.86.0"
          test "$(protoc --version | awk '{print $2}')" = "3.21.12"
          test "gcc-$(gcc -dumpfullversion)" = "gcc-13.3.0"

      - name: Reject an existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release v$VERSION already exists" >&2
            exit 1
          fi

      - name: Install frontend dependencies
        run: bun --cwd=_frontend install --frozen-lockfile

      - name: Verify frontend
        run: |
          bun --cwd=_frontend run typecheck
          bun --cwd=_frontend run check
          bun --cwd=_frontend test
          bun --cwd=_frontend run build:web

      - name: Verify Go code
        run: |
          go test -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension" ./...
          go test -race -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension" ./...
          go vet -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension" ./...
          go test -run '^$' -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension integration" ./...
          go test -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension integration" ./internal/mcp

      - name: Fuzz public protocol boundaries
        run: |
          go test -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension" ./internal/registry -run '^$' -fuzz '^FuzzRegistryInputs$' -fuzztime 10s
          go test -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension" ./internal/objectstore -run '^$' -fuzz '^FuzzS3Inputs$' -fuzztime 10s
          go test -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension" ./internal/objectstore -run '^$' -fuzz '^FuzzSigV4Inputs$' -fuzztime 10s
          go test -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension" ./internal/internaldns -run '^$' -fuzz '^FuzzDNSInputs$' -fuzztime 10s
          go test -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension" ./internal/ingress -run '^$' -fuzz '^FuzzProxyInputs$' -fuzztime 10s

      - name: Build and verify bundled runtime
        env:
          PLATFORMD_STRICT_TOOLCHAIN: "1"
        run: build/runtime-linux-amd64.sh

      - name: Verify private runtime lifecycle and isolation
        run: |
          cleanup_runtime_integration() {
            sudo rm -rf \
              /run/platformd-integration \
              /var/lib/platformd-integration \
              /var/lib/platformd/releases/current
          }
          trap cleanup_runtime_integration EXIT
          go test -c \
            -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension integration" \
            -o dist/containerengine-integration.test \
            ./internal/containerengine
          cleanup_runtime_integration
          sudo mkdir -p /var/lib/platformd/releases/current
          sudo cp -a dist/runtime /var/lib/platformd/releases/current/runtime
          sudo /usr/bin/env \
            HOME=/root \
            PATH=/nonexistent \
            PLATFORMD_FIREWALL_INTEGRATION=1 \
            PLATFORMD_RUNTIME_INTEGRATION=1 \
            dist/containerengine-integration.test \
              -test.timeout=5m \
              -test.v
          sudo systemd-run \
            --quiet \
            --wait \
            --collect \
            --pipe \
            --service-type=exec \
            --unit=platformd-runtime-cgroup-integration \
            --property=Delegate=yes \
            --property=DelegateSubgroup=control \
            --property=TasksMax=infinity \
            --setenv=HOME=/root \
            --setenv=PATH=/nonexistent \
            --setenv=PLATFORMD_CGROUP_INTEGRATION=1 \
            --setenv=PLATFORMD_RUNTIME_INTEGRATION=1 \
            "$PWD/dist/containerengine-integration.test" \
              -test.run='^TestDelegatedCgroupPlacementAndLimits$' \
              -test.timeout=3m \
              -test.v

      - name: Verify managed runtimes and privileged host operations
        run: |
          sudo rm -rf /var/lib/platformd/releases/current
          sudo mkdir -p /var/lib/platformd/releases/current
          sudo cp -a dist/runtime /var/lib/platformd/releases/current/runtime
          trap 'sudo rm -rf /var/lib/platformd/releases/current' EXIT

          integration_tags="containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension integration"
          for package in managedpostgres managedredis daemon registry rootexec hostterminal; do
            go test -c \
              -tags "$integration_tags" \
              -o "dist/$package-integration.test" \
              "./internal/$package"
          done

          run_delegated() {
            local unit="$1"
            local binary="$2"
            local timeout="$3"
            shift 3
            sudo systemd-run \
              --quiet \
              --wait \
              --collect \
              --pipe \
              --service-type=exec \
              --unit="$unit" \
              --property=Delegate=yes \
              --property=DelegateSubgroup=control \
              --property=TasksMax=infinity \
              --setenv=HOME=/root \
              "$@" \
              "$PWD/$binary" \
                -test.timeout="$timeout" \
                -test.v
          }

          run_delegated \
            platformd-managedpostgres-integration \
            dist/managedpostgres-integration.test \
            10m \
            --setenv=PATH=/nonexistent \
            --setenv=PLATFORMD_MANAGED_POSTGRES_INTEGRATION=1
          run_delegated \
            platformd-managedredis-integration \
            dist/managedredis-integration.test \
            5m \
            --setenv=PATH=/nonexistent \
            --setenv=PLATFORMD_MANAGED_REDIS_INTEGRATION=1
          run_delegated \
            platformd-daemon-runtime-integration \
            dist/daemon-integration.test \
            5m \
            --setenv=PATH=/nonexistent \
            --setenv=PLATFORMD_RUNTIME_INTEGRATION=1 \
            --setenv=PLATFORMD_CGROUP_INTEGRATION=1
          run_delegated \
            platformd-rootexec-integration \
            dist/rootexec-integration.test \
            3m \
            --setenv=PLATFORMD_ROOTEXEC_INTEGRATION=1
          run_delegated \
            platformd-hostterminal-integration \
            dist/hostterminal-integration.test \
            3m \
            --setenv=PLATFORMD_HOST_TERMINAL_INTEGRATION=1

          sudo /usr/bin/env \
            HOME=/root \
            PATH=/nonexistent \
            PLATFORMD_REGISTRY_LOCAL_PULL_INTEGRATION=1 \
            PLATFORMD_RUNTIME_ASSET_ROOT="$PWD/dist/runtime" \
            dist/registry-integration.test \
              -test.timeout=3m \
              -test.v

      - name: Build self-contained release
        run: |
          CGO_ENABLED=1 go build \
            -trimpath \
            -tags "containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_zfs grpcnotrace seccomp sqlite_omit_load_extension" \
            -ldflags "-X github.com/iivankin/platformd/internal/version.Version=$VERSION -X github.com/iivankin/platformd/internal/version.Commit=$GITHUB_SHA" \
            -o dist/platformd-linux-amd64 \
            .
          build/verify-elf.sh \
            dist/platformd-linux-amd64 \
            dist/runtime/crun \
            dist/runtime/conmon \
            dist/runtime/netavark \
            dist/runtime/catatonit
          go run ./tools/bundle --executable dist/platformd-linux-amd64 --runtime dist/runtime
          python3 -m zipfile -t dist/platformd-linux-amd64

      - name: Verify the same release bytes on Debian 13
        run: |
          rm -rf dist/debian-13-smoke
          mkdir -p dist/debian-13-smoke
          python3 -m zipfile -e dist/platformd-linux-amd64 dist/debian-13-smoke
          chmod 0755 \
            dist/debian-13-smoke/runtime/catatonit \
            dist/debian-13-smoke/runtime/conmon \
            dist/debian-13-smoke/runtime/crun \
            dist/debian-13-smoke/runtime/netavark
          docker run --rm --platform linux/amd64 \
            --volume "$PWD/dist:/release:ro" \
            debian:13-slim@sha256:a617c1cdde36a7e0194b2f07dff669e1753c03c3205356b94f9f350b0f9a57d1 \
            sh -ceu '
              apt-get update
              apt-get install --yes --no-install-recommends \
                libcap2 \
                libgcc-s1 \
                libglib2.0-0t64 \
                libjson-c5 \
                libseccomp2
              ! command -v nft
              ! command -v iptables
              for helper in catatonit conmon crun netavark; do
                env -i LC_ALL=C LANG=C "/release/debian-13-smoke/runtime/$helper" --version >/dev/null
              done
              status=0
              /release/platformd-linux-amd64 >/tmp/platformd-output 2>&1 || status=$?
              test "$status" -eq 2
              grep -Fq "usage: platformd init" /tmp/platformd-output
            '

      - name: Sign release manifest
        env:
          RELEASE_PRIVATE_KEY_B64: ${{ secrets.PLATFORMD_RELEASE_PRIVATE_KEY_B64 }}
        run: |
          test -n "$RELEASE_PRIVATE_KEY_B64"
          key_path="$RUNNER_TEMP/platformd-release-private.pem"
          umask 077
          printf '%s' "$RELEASE_PRIVATE_KEY_B64" | base64 --decode > "$key_path"
          arguments=(
            --binary dist/platformd-linux-amd64
            --binary-url "https://github.com/$GITHUB_REPOSITORY/releases/download/v$VERSION/platformd-linux-amd64"
            --version "$VERSION"
            --private-key "$key_path"
            --output dist/platformd-linux-amd64.manifest.json
          )
          if [[ -n "$SUPPORTED_FROM" ]]; then
            IFS=',' read -ra source_versions <<< "$SUPPORTED_FROM"
            for source_version in "${source_versions[@]}"; do
              arguments+=(--supported-from "$source_version")
            done
          fi
          go run ./tools/release-manifest "${arguments[@]}"
          rm -f "$key_path"
          (
            cd dist
            sha256sum platformd-linux-amd64 platformd-linux-amd64.manifest.json > SHA256SUMS
            sha256sum --check SHA256SUMS
          )

      - name: Publish immutable release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "v$VERSION" \
            --generate-notes \
            dist/platformd-linux-amd64 \
            dist/platformd-linux-amd64.manifest.json \
            dist/SHA256SUMS
